<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>堆像素 - 时光沙漏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 左上角工具栏 -->
    <div class="toolbar top-left">
        <button class="icon-btn" id="downloadBtn" title="下载作品">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
        </button>
        <button class="icon-btn" id="shareBtn" title="分享作品">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="18" cy="5" r="3"></circle>
                <circle cx="6" cy="12" r="3"></circle>
                <circle cx="18" cy="19" r="3"></circle>
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
            </svg>
        </button>
        <button class="icon-btn" id="clearBtn" title="清空画布">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
        </button>
    </div>

    <!-- 右上角调色板 -->
    <div class="toolbar top-right">
        <div class="color-palette" id="colorPalette">
            <!-- 48色将由JS生成 -->
        </div>
        <div class="current-color" id="currentColor"></div>
    </div>

    <!-- 诗词显示区域 -->
    <div class="poem-container" id="poemContainer">
        <p class="poem-text" id="poemText"></p>
    </div>

    <!-- 画布 -->
    <canvas id="canvas"></canvas>

    <!-- 提示文字 -->
    <div class="hint" id="hint">
        点击开始/停止 · 移动鼠标挥洒像素
    </div>

    <script src="script.js"></script>
</body>
</html>
